<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 id="home-el">HOME</h3>
                <h2 class="score-card" id="home-score">0</h2>
                <div class="add-point">
                   <button onclick="homePlusOne()">+1</button>
                   <button onclick="homePlusTwo()">+2</button>
                   <button onclick="homePlusThree()">+3</button>
                </div>
                  <div>
                    <p>FOUL</p>
                    <p class="foulcount" id="foul-home"></p>
                    <button onclick="foulHomeUpdate()">+1</button>
                </div>
            </div>
            <div id="new-game">
                <button onclick="newGame()">NEW GAME</button>
            </div>
            <div>
                <h3 id="guest-el">GUEST</h3>
                <h2 class="score-card" id="guest-score">0</h2>
                <div class="add-point">
                   <button onclick="guestPlusOne()">+1</button>
                   <button onclick="guestPlusTwo()">+2</button>
                   <button onclick="guestPlusThree()">+3</button>
                </div>
                <div>
                    <p>FOUL</p>
                    <p class="foulcount" id="foul-guest"></p>
                    <button onclick="foulGuestUpdate()">+1</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
